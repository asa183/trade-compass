name: Daily Market & Deal Update

on:
  schedule:
    # 毎日22:00 UTC = 日本時間(JST)の翌朝07:00に自動実行
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHubのWeb UIから手動実行できるようにする

jobs:
  run-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Hit specific Next.js Cron Route
        # 実際のエンドポイントURLに書き換えてください（例: https://trade-compass.onrender.com）
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL is not set in GitHub Secrets. Using dummy URL for now."
            exit 0
          fi
          
          curl -X GET "$APP_URL/api/engine/cron" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail
